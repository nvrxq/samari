dataset:
  frames_per_sample: 32
  batch_size: 1
  num_workers: 1
  binary_task: true
  train_data_dir: "datasets/sav_example"
  val_data_dir: "datasets/sav_example"

train:
  learning_rate: 0.001
  weight_decay: 0.0001
  max_epochs: 10
  last_frame_loss_weight: 1.2
  precision: "16-mixed"
  #strategy: "ddp"
  log_dir: "samari-tiny"
  accelerator: "gpu"
  devices: "-1"

model:
  encoder:
    input_channels: 4 # 3 (RGB) + 1 (Mask)
    skip_connections: true
    channels:
      - 16
      - 32
      - 64
    kernels:
      - [3, 3, 3]
      - [3, 3, 3]
      - [3, 3, 3]
    strides:
      - [1, 1, 1]
      - [1, 1, 1]
      - [1, 1, 1]
    paddings:
      - [1, 1, 1]
      - [1, 1, 1]
      - [1, 1, 1]
    pool_kernels:
      - [1, 2, 2]
      - [1, 2, 2]
      - [1, 2, 2]
    pool_paddings:
      - [0, 0, 0]
      - [0, 0, 0]
      - [0, 0, 0]
  transformer:
    d_model: 64
    nhead: 4
    num_layers: 2
    dropout: 0.1
  decoder:
    channels:
      - 64
      - 32
      - 16
    kernels:
      - [3, 3, 3]
      - [3, 3, 3]
      - [3, 3, 3]
    strides:
      - [1, 2, 2]
      - [1, 2, 2]
      - [1, 2, 2]
    paddings:
      - [1, 1, 1]
      - [1, 1, 1]
      - [1, 1, 1]
    output_paddings:
      - [0, 1, 1]
      - [0, 1, 1]
      - [0, 1, 1]